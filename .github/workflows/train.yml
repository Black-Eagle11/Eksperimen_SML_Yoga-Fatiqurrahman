name: CI_Retrain_Model (Yoga Fatiqurrahman)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    env:
      MLFLOW_TRACKING_URI: file://${{ github.workspace }}/Workflow-CI/MLProject/mlruns
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
      DOCKER_IMAGE_NAME: "yogarahman-heart-disease-ci"
      PYTHON_VERSION: "3.12"

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Virtual Environment + Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install mlflow==2.19.0
          pip install -r Workflow-CI/MLProject/requirements_ci.txt
          echo "source venv/bin/activate" >> $GITHUB_ENV

      - name: Check MLflow Version
        run: |
          source venv/bin/activate
          mlflow --version

      - name: Show Working Directory & Files
        run: |
          echo "== Current Dir =="
          pwd
          echo "== Listing Files =="
          ls -R .

      - name: Run MLflow Project (Training)
        run: |
          source venv/bin/activate
          cd Workflow-CI/MLProject
          echo "== Running MLflow Project =="
          mlflow run . --env-manager=local -P data_dir="namadataset_preprocessing"

      - name: Print MLflow Run List
        run: |
          source venv/bin/activate
          echo "== List MLflow experiments =="
          mlflow experiments search

          echo "== List runs for experiment 0 =="
          mlflow runs list --experiment-id 0

      - name: Locate Trained Model
        id: find_model
        run: |
          echo "== Searching artifacts/model folder =="
          MODEL_PATH=$(find Workflow-CI/MLProject/mlruns -type d -path "*/artifacts/model" | head -n 1)
          echo "Model Path: $MODEL_PATH"

          if [ -z "$MODEL_PATH" ]; then
            echo "ERROR: Model artifact not found!"
            exit 1
          fi

          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_artifacts
          path: Workflow-CI/MLProject/mlruns/
          if-no-files-found: error

      - name: Commit Updated Artifacts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Workflow-CI/MLProject/mlruns || true
          git commit -m "Auto retrain: model terbaru ($(date))" || echo "Tidak ada perubahan."
          git push origin main || echo "Tidak bisa push."

      - name: Docker Login
        run: |
          echo "${{ env.DOCKER_HUB_PASSWORD }}" | docker login \
            -u "${{ env.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Build Docker Image (MLflow)
        run: |
          source venv/bin/activate
          cd Workflow-CI/MLProject
          echo "== Building Docker Image =="
          mlflow models build-docker \
            --model-uri $MODEL_PATH \
            --name ${{ env.DOCKER_IMAGE_NAME }}

      - name: Push Docker Image
        run: |
          docker tag ${{ env.DOCKER_IMAGE_NAME }} \
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

          docker push \
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Workflow Summary
        run: |
          echo "=== Workflow Completed ==="
          echo "Model retrained successfully!"
          echo "Docker image pushed to Docker Hub!"
          echo "Timestamp: $(date)"